spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT:4336}/${MYSQL_DB}?useSSL=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 32
      minimum-idle: 4

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:4379}
      # prod 必设密码（dev 默认 123456 不可用）
      password: ${REDIS_PASSWORD}
      timeout: 5s
      lettuce:
        pool:
          # prod 加大连接池
          max-active: 32
          max-idle: 16
          min-idle: 4

  # Flyway 仅 V1（Q8 决策：prod 零种子用户；migration-prod 目录里没有 V2__seed_admin_user.sql）
  flyway:
    locations: classpath:db/migration-prod

# Knife4j：prod 默认关（避免 API 文档泄露到公网）
knife4j:
  enable: ${KNIFE4J_ENABLE:false}

logging:
  level:
    root: INFO
    com.wshake: INFO
