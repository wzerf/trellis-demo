# ============================================================
# java-admin dev 依赖编排
# 位置：backend/java-admin/deploy/docker-compose.yml
# 用途：dev 期起 mysql + redis + nacos（java-admin 自身不在 compose）
# ============================================================
services:
  # ----------------------------
  # MySQL 8.4
  # ----------------------------
  mysql:
    image: mysql:8.4
    container_name: java-admin-mysql
    restart: unless-stopped
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-javaadmin_dev}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - java-admin-net
    healthcheck:
      test:
        ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ----------------------------
  # Redis 7
  # ----------------------------
  redis:
    image: redis:7-alpine
    container_name: java-admin-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command:
      - "redis-server"
      - "--requirepass"
      - "${REDIS_PASSWORD:-}"
      - "--appendonly"
      - "yes"
    volumes:
      - redis_data:/data
    networks:
      - java-admin-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ----------------------------
  # Nacos 2.4.3（dev：standalone + Derby 持久化 + 鉴权关闭）
  # Q11 决策：默认启动；Q10 决策：Nacos 是否被 java-admin 连接由 NACOS_CONFIG_ENABLED 控制
  # ----------------------------
  nacos:
    image: nacos/nacos-server:v2.4.3
    container_name: java-admin-nacos
    restart: unless-stopped
    ports:
      - "8848:8848"
      - "9848:9848"
    environment:
      MODE: standalone
      SPRING_DATASOURCE_PLATFORM: derby
      NACOS_AUTH_ENABLE: "false" # dev 关闭鉴权（prod 必须改为 true）
      JVM_XMS: 512m
      JVM_XMX: 512m
      JVM_XMN: 256m
    volumes:
      - nacos_data:/home/nacos/data
      - nacos_logs:/home/nacos/logs
    networks:
      - java-admin-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ----------------------------
  # Adminer（仅 --profile dev 启动）
  # ----------------------------
  adminer:
    image: adminer:latest
    container_name: java-admin-adminer
    restart: unless-stopped
    profiles: ["dev"]
    ports:
      - "8081:8080"
    environment:
      ADMINER_DEFAULT_SERVER: mysql
      ADMINER_DESIGN: pepa-linha-dark
    networks:
      - java-admin-net
    depends_on:
      mysql:
        condition: service_healthy

networks:
  java-admin-net:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
  nacos_data:
  nacos_logs:
