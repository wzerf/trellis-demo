# lefthook configuration
#
# Why lefthook instead of Vite+'s built-in hooks?
# Vite+ ships a `vp config` installer that copies `.vite-hooks/pre-commit` into
# `.git/hooks/` during `pnpm install`. We moved to lefthook so the hook layout
# is driven by a single, version-controlled `lefthook.yml` and not by an install
# side effect. The behavior is kept identical: pre-commit runs `vp staged`,
# which formats / lints / type-checks the staged files (see `vite.config.ts`).
#
# Escape hatches (equivalent to Vite+'s `VITE_GIT_HOOKS=0`):
#   - `LEFTHOOK=0 git commit ...`        # skip via env var
#   - `git commit --no-verify ...`       # skip via git flag
#   - `LEFTHOOK=0 pnpm exec lefthook run pre-commit`  # bypass when invoking directly
#
# Java toolchain (backend/java-admin, 2026-06-14):
#   - pre-commit.java-spotless: runs `mvn spotless:apply` to format staged *.java
#     files with palantir-java-format and re-stages any changes.
#   - pre-push.java-checkstyle:  runs `mvn checkstyle:check` against the Palantir
#     Baseline ruleset to fail fast on naming / complexity / style violations.
#     (Full enforcement also lives at `mvn verify` via maven-checkstyle-plugin.)
#
# Docs:
#   - https://lefthook.dev/configuration/
#   - https://viteplus.dev/guide/commit-hooks

pre-commit:
  # Mirrors Vite+'s default pre-commit behavior: run fmt + lint + type-check
  # only against staged files. `pnpm exec` ensures `vp` is resolved from
  # `node_modules/.bin` even when lefthook runs in a subshell without the
  # workspace's PATH.
  parallel: true
  commands:
    staged:
      # Frontend / TS / Vue / global JS staged-file pipeline (Vite+).
      # `vp staged` reads the `staged` map in `vite.config.ts` and runs the
      # mapped task on each staged file. The current mapping is a
      # function task (lint-staged API) on `**/*` that:
      #   1. filters out paths inside `apps/vue-vben-admin/` (the
      #      submodule carries its own `oxfmt.config.ts` / `oxlint.config.ts`
      #      / `lefthook.yml` and is handled by its own pre-commit pipeline
      #      — see `apps/vue-vben-admin/lefthook.yml`),
      #   2. runs `vp check --fix` on the remaining files.
      # Format and lint issues on those files are auto-fixed in place and
      # the modified files are re-staged automatically by `lint-staged`.
      run: pnpm exec vp staged
    java-spotless:
      # Backend Java formatter — runs only when at least one staged file matches.
      # Spotless is `apply`-mode here (modifies files in-place) so we re-add the
      # touched paths via `git add` + lefthook's `stage_fixed: true`.
      glob: "backend/java-admin/**/src/{main,test}/java/**/*.java"
      run: mvn -B -q -f backend/java-admin/pom.xml spotless:apply && git add backend/java-admin
      stage_fixed: true

pre-push:
  parallel: true
  commands:
    full-check:
      # Workspace-wide fmt + lint + type-check safety net. Pre-commit only
      # touches staged files (via `vp staged`); pre-push runs the same
      # pipeline across the whole root workspace so any drift introduced
      # by bypassing the pre-commit hook (e.g. `--no-verify`, or files
      # touched but not staged) is caught before the push.
      #
      # `apps/vue-vben-admin/**` is already excluded by the root
      # `fmt` / `lint` `ignorePatterns` in `vite.config.ts`, so this
      # never runs against the submodule's files (the submodule has its
      # own pipeline — `apps/vue-vben-admin/lefthook.yml`).
      #
      # Note: `--fix` will rewrite files in the working tree if anything
      # is found. The push itself still uses the already-made commits
      # (working-tree changes are not part of the push), so review the
      # diff after the hook and follow up with a fixup commit when
      # needed. Drop `--fix` if you want a hard-fail-only gate.
      run: pnpm exec vp check --fix
    java-checkstyle:
      # Backend static check — fail fast on naming / complexity / style violations.
      # The same ruleset also runs at `mvn verify` (maven-checkstyle-plugin bound
      # to verify phase) as a safety net; pre-push is the fast-feedback layer.
      glob: "backend/java-admin/**/src/{main,test}/java/**/*.java"
      run: mvn -B -f backend/java-admin/pom.xml checkstyle:check
    java-errorprone:
      # Backend correctness check — Google Error Prone 2.50.0(2026-06-15 集成)
      # 跑 `mvn compile`(含 javac + Error Prone javac plugin),WARN 不阻断 push。
      # 全量检查也由 maven-compiler-plugin 绑到 compile 阶段保证。
      # glob 同 java-checkstyle:只在 Java 源码变更时跑。
      # 任何 ERROR(理论上 WARN 不应出现 ERROR)会阻断 push;
      # WARN 不阻断 —— dev-time visibility,不当门禁。
      glob: "backend/java-admin/**/src/{main,test}/java/**/*.java"
      run: mvn -B -q -f backend/java-admin/pom.xml -DskipTests compile
