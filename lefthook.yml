# lefthook configuration
# 取代 Vite+ 的 `vp config` 安装时注入 hook 的方式,改为单一版本受控配置。
#
# Escape hatches:
#   - `LEFTHOOK=0 git commit ...`
#   - `git commit --no-verify ...`
#
# Docs: https://lefthook.dev/configuration/

pre-commit:
  # 对暂存文件跑 fmt + lint + type-check。
  parallel: true
  commands:
    staged:
      # Vite+ lint-staged 流水线(排除 vue-vben-admin 子模块,它有独立 hook:
      # apps/vue-vben-admin/lefthook.yml)。
      run: pnpm exec vp staged
    java-spotless:
      # 用 palantir-java-format 格式化暂存的 *.java,并重新 stage。
      glob: "backend/java-admin/**/src/{main,test}/java/**/*.java"
      run: mvn -B -q -f backend/java-admin/pom.xml spotless:apply && git add backend/java-admin
      stage_fixed: true
    codegraph-sync:
      # 同步 codegraph 索引到最新工作树。
      run: codegraph sync
      stage_fixed: false

post-checkout:
  commands:
    codegraph-sync:
      run: codegraph sync

post-merge:
  commands:
    codegraph-sync:
      run: codegraph sync

post-rewrite:
  commands:
    codegraph-sync:
      run: codegraph sync

post-commit:
  commands:
    codegraph-sync:
      run: codegraph sync

pre-push:
  # 全工作区 fmt + lint + type-check,兜底 --no-verify 或未暂存改动。
  parallel: true
  commands:
    full-check:
      # Caveat: --fix 会改写 working tree。push 用的是已生成的 commit,
      # 改完后需自行 review 并用 fixup commit 跟进。
      run: pnpm exec vp check --fix
    java-checkstyle:
      # 命名 / 复杂度 / 风格门禁,`mvn verify` 也会再跑一次。
      glob: "backend/java-admin/**/src/{main,test}/java/**/*.java"
      run: mvn -B -f backend/java-admin/pom.xml checkstyle:check
    java-errorprone:
      # 跑 `mvn compile`(含 Error Prone 2.50.0 javac 插件);WARN 不阻断 push,ERROR 阻断。
      glob: "backend/java-admin/**/src/{main,test}/java/**/*.java"
      run: mvn -B -q -f backend/java-admin/pom.xml -DskipTests compile

commit-msg:
  # Conventional Commits 门禁;无根配置时 commitlint 回退到
  # @commitlint/config-conventional。跳过方式同上方 Escape hatches。
  commands:
    commitlint:
      run: pnpm exec commitlint --edit "$1"
